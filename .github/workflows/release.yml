name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Step 1：测试 ────────────────────────────────────────────────────────────
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"
      - name: Run all tests
        run: |
          cargo test \
            --workspace \
            --exclude opencli-rs-browser \
            --exclude opencli-rs-ai \
            --exclude opencli-rs-cli \
            --exclude opencli-rs-external

  # ── Step 2：打包 adapters + summaries + extension（与平台无关，只需一次）────
  package-assets:
    name: Package assets
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package adapters
        run: |
          tar -czf adapters.tar.gz adapters/
          sha256sum adapters.tar.gz > adapters.tar.gz.sha256

      - name: Package summaries
        run: |
          tar -czf summaries.tar.gz summaries/
          sha256sum summaries.tar.gz > summaries.tar.gz.sha256

      - name: Build Chrome extension
        working-directory: extension
        run: |
          npm ci
          npm run build

      - name: Package Chrome extension
        run: |
          cd extension
          zip -r ../opencli-extension.zip dist/ manifest.json icons/ src/popup.html
          cd ..
          sha256sum opencli-extension.zip > opencli-extension.zip.sha256

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            adapters.tar.gz
            adapters.tar.gz.sha256
            summaries.tar.gz
            summaries.tar.gz.sha256
            opencli-extension.zip
            opencli-extension.zip.sha256
          retention-days: 1

  # ── Step 3：交叉编译统一 binary ──────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}"

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin opencli

      - name: Prepare artifact
        shell: bash
        run: |
          OUTDIR="target/${{ matrix.target }}/release"
          SUFFIX="${{ matrix.suffix }}"

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            EXT=".exe"
            HASH_CMD="sha256sum"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            EXT=""
            HASH_CMD="shasum -a 256"
          else
            EXT=""
            HASH_CMD="sha256sum"
          fi

          DEST="opencli-${SUFFIX}${EXT}"
          cp "${OUTDIR}/opencli${EXT}" "$DEST"
          $HASH_CMD "$DEST" > "${DEST}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencli-${{ matrix.suffix }}
          path: "opencli-${{ matrix.suffix }}*"
          retention-days: 1

  # ── Step 4：创建 GitHub Release ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, package-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          CHANGELOG=$(git log $RANGE \
            --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
            --no-merges | head -50)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No significant changes"
          fi
          {
            echo "content<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: List release assets
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.content }}

            ---

            ## 安装

            ### 一键安装脚本（推荐）

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/install.sh | bash
            ```

            脚本会自动检测平台，下载 `opencli` 二进制并安装 adapters。

            ### 手动安装

            **1. 下载 `opencli` 二进制**

            | 平台 | 文件 |
            |---|---|
            | macOS Apple Silicon | `opencli-macos-arm64` |
            | Linux x86_64 | `opencli-linux-x86_64` |
            | Windows x86_64 | `opencli-windows-x86_64.exe` |

            ```bash
            # macOS 示例
            curl -L .../opencli-macos-arm64 -o opencli
            chmod +x opencli
            sudo mv opencli /usr/local/bin/
            ```

            **2. 安装 adapters（必须）**

            ```bash
            mkdir -p ~/.opencli-rs
            curl -L .../adapters.tar.gz | tar -xz -C ~/.opencli-rs/
            ```

            **3. 安装 Chrome 扩展（必须）**

            下载 `opencli-extension.zip`，在 Chrome `chrome://extensions` 开启开发者模式，
            解压后点击「加载已解压的扩展程序」选择 `dist/` 目录。

            **4. 安装 summaries（可选，AI 搜索用）**

            ```bash
            curl -L .../summaries.tar.gz | tar -xz -C ~/.opencli-rs/
            ```

            ### 使用

            ```bash
            opencli zhihu hot           # 执行 adapter
            opencli daemon              # 启动调度 daemon
            opencli status              # 查看 daemon 状态
            opencli job list            # 管理定时任务
            ```
          files: |
            artifacts/opencli-macos-arm64*
            artifacts/opencli-linux-x86_64*
            artifacts/opencli-windows-x86_64*
            artifacts/adapters.tar.gz
            artifacts/adapters.tar.gz.sha256
            artifacts/summaries.tar.gz
            artifacts/summaries.tar.gz.sha256
            artifacts/opencli-extension.zip
            artifacts/opencli-extension.zip.sha256
          fail_on_unmatched_files: false

  # ── Step 5：生成并上传安装脚本 ───────────────────────────────────────────────
  upload-install-script:
    name: Upload install script
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate install.sh
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          cat > install.sh << 'SCRIPT_EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          TAG="__TAG__"
          REPO="__REPO__"
          BASE_URL="__BASE_URL__"
          INSTALL_DIR="${OPENCLI_INSTALL_DIR:-/usr/local/bin}"
          DATA_DIR="${OPENCLI_DATA_DIR:-$HOME/.opencli-rs}"

          OS="$(uname -s)"
          case "$OS" in
            Darwin)  SUFFIX="macos-arm64" ;;
            Linux)   SUFFIX="linux-x86_64" ;;
            *)
              echo "Unsupported OS: $OS"
              echo "Windows users: download opencli-windows-x86_64.exe manually from:"
              echo "  ${BASE_URL}/opencli-windows-x86_64.exe"
              exit 1
              ;;
          esac

          echo "Platform: $OS → opencli-${SUFFIX}"

          TMP="$(mktemp -d)"
          trap 'rm -rf "$TMP"' EXIT

          echo "Downloading opencli-${SUFFIX}..."
          curl -fsSL "${BASE_URL}/opencli-${SUFFIX}" -o "$TMP/opencli"
          chmod +x "$TMP/opencli"

          if [ -w "$INSTALL_DIR" ]; then
            mv "$TMP/opencli" "$INSTALL_DIR/opencli"
          else
            echo "Installing to $INSTALL_DIR (sudo required)..."
            sudo mv "$TMP/opencli" "$INSTALL_DIR/opencli"
          fi
          echo "✓ Installed opencli to $INSTALL_DIR/"

          mkdir -p "$DATA_DIR"

          echo "Downloading adapters..."
          curl -fsSL "${BASE_URL}/adapters.tar.gz" | tar -xz -C "$DATA_DIR"
          echo "✓ Adapters installed to $DATA_DIR/adapters/"

          echo "Downloading summaries..."
          curl -fsSL "${BASE_URL}/summaries.tar.gz" | tar -xz -C "$DATA_DIR" || true
          echo "✓ Summaries installed (optional)"

          echo ""
          echo "Installation complete!"
          echo ""
          echo "Next step: install the Chrome extension"
          echo "  1. Download opencli-extension.zip from:"
          echo "     ${BASE_URL}/opencli-extension.zip"
          echo "  2. Unzip it"
          echo "  3. Open chrome://extensions, enable Developer mode"
          echo "  4. Click 'Load unpacked' and select the unzipped folder"
          echo ""
          echo "Then run: opencli --help"
          SCRIPT_EOF

          # Replace placeholders
          sed -i "s|__TAG__|${TAG}|g" install.sh
          sed -i "s|__REPO__|${REPO}|g" install.sh
          sed -i "s|__BASE_URL__|${BASE_URL}|g" install.sh
          chmod +x install.sh

      - name: Generate latest version file
        run: |
          printf '%s\n' "${GITHUB_REF_NAME#v}" > latest

      - name: Upload install metadata to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" install.sh --clobber
          gh release upload "${{ github.ref_name }}" latest --clobber
