site: crates
name: info
description: 查看 crates.io 上某个 Rust 包详情
domain: crates.io
strategy: public
browser: false

args:
  crate:
    type: str
    required: true
    positional: true
    description: "Crate name"

pipeline:
  - fetch:
      url: "https://crates.io/api/v1/crates/${{ args.crate }}"
      headers:
        User-Agent: "opencli-rs (https://github.com/opencli)"

  - select: crate

  - evaluate: |
      (() => {
        const d = ${{ data }};
        return [{
          name: d.name,
          version: d.max_stable_version || d.newest_version,
          downloads: d.downloads,
          description: d.description || '',
          homepage: d.homepage || '',
          repository: d.repository || '',
          documentation: d.documentation || ''
        }];
      })()

columns: [name, version, downloads, description]
