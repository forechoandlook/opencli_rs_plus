site: npm
name: search
description: 搜索 npm 包
domain: registry.npmjs.org
strategy: public
browser: false

args:
  query:
    type: str
    required: true
    positional: true
    description: "Search keywords"
  limit:
    type: int
    default: 20
    description: "Number of results"

pipeline:
  - fetch:
      url: "https://registry.npmjs.org/-/v1/search?text=${{ args.query }}&size=${{ args.limit }}"

  - select: objects

  - map:
      name: ${{ item.package.name }}
      version: ${{ item.package.version }}
      description: ${{ item.package.description || '' }}
      author: ${{ item.package.publisher.username || '' }}
      date: ${{ item.package.date || '' }}
      url: ${{ item.package.links.npm || '' }}

  - limit: ${{ args.limit }}

columns: [name, version, description, author]
