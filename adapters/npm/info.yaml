site: npm
name: info
description: 查看 npm 包详情
domain: registry.npmjs.org
strategy: public
browser: false

args:
  package:
    type: str
    required: true
    positional: true
    description: "Package name"

pipeline:
  # /latest returns only the latest version manifest (small), avoiding the
  # multi-MB full registry document.
  - fetch:
      url: "https://registry.npmjs.org/${{ args.package }}/latest"

  - evaluate: |
      (() => {
        const d = ${{ data }};
        return [{
          name: d.name,
          version: d.version,
          description: d.description || '',
          license: d.license || '',
          homepage: d.homepage || '',
          repository: (d.repository && d.repository.url) ? d.repository.url.replace(/^git\+/, '').replace(/\.git$/, '') : '',
          dependencies: d.dependencies ? Object.keys(d.dependencies).length : 0
        }];
      })()

columns: [name, version, license, dependencies, homepage]
