site: qwen
name: web-dev
description: Open Qwen Web Dev, submit a prompt, and report current-session result
domain: chat.qwen.ai
strategy: public
browser: true
timeoutSeconds: 180

args:
  prompt:
    positional: true
    type: string
    required: true
    description: Web page prompt
  timeout:
    type: int
    default: 30
    description: Max seconds to wait for a session-state result

columns: [Feature, Status, Detail, Placeholder, Modes, Inputs]

pipeline:
  - navigate: https://chat.qwen.ai/
  - wait: 2
  - evaluate: |
      (async () => {
        const featureKey = 'web_dev';
        const featureLabels = ['Web Dev', 'Web 开发', '网页开发'];
        const prompt = ${{ args.prompt | json }};
        const timeout = Number(${{ args.timeout }}) || 30;
        const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

        const cfgRes = await fetch('/api/v2/configs/');
        const cfgJson = await cfgRes.json();
        const cfg = cfgJson?.data || {};
        const apiAvailable =
          Object.prototype.hasOwnProperty.call(cfg.features?.feature_feature || {}, featureKey) ||
          Object.prototype.hasOwnProperty.call(cfg.features?.feature_file || {}, featureKey);

        const candidates = () => Array.from(document.querySelectorAll('[role="menuitem"], button, [role="button"], div, span'));
        const findByText = (textList) =>
          candidates().find((node) => {
            const current = (node.textContent || '').replace(/\s+/g, ' ').trim();
            return textList.some(text => current === text || current.includes(text));
          });
        const resolveItem = (textList) => findByText(textList)?.closest?.('[role="menuitem"], button, [role="button"]') || findByText(textList) || null;
        
        const isDisabled = (node) => {
          if (!node) return false;
          const own = node.getAttribute?.('aria-disabled') === 'true' || node.getAttribute?.('disabled') != null;
          const cls = String(node.className || '');
          return own || /disabled/i.test(cls) || !!node.closest?.('[aria-disabled="true"], .ant-dropdown-menu-item-disabled, .ant-menu-item-disabled');
        };
        const loginRequired = () => /log in|sign up|stay logged out|login or sign up|登录|注册/.test(document.body?.innerText || '');
        const responseText = () => {
          const links = Array.from(document.querySelectorAll('a[href]'))
            .map((node) => node.href)
            .filter((href) => /^https?:/.test(href) && !href.includes('terms') && !href.includes('privacy'));
          if (links.length) return links[links.length - 1];
          const texts = Array.from(document.querySelectorAll('main [class*="markdown"], main article, main [data-role], main pre, main code'))
            .map((node) => (node.innerText || '').trim())
            .filter((text) => text && text !== prompt && text.length > 24 && !/terms of service|privacy policy/i.test(text));
          return texts[texts.length - 1] || '';
        };

        let item = null;
        for (let attempt = 0; attempt < 5; attempt++) {
          const trigger = document.querySelector('.mode-select .ant-dropdown-trigger') || document.querySelector('.mode-select');
          trigger?.click();
          await sleep(500);
          
          item = resolveItem(featureLabels);
          if (!item) {
            const moreBtn = resolveItem(['More', '更多']);
            if (moreBtn) {
              moreBtn.click();
              await sleep(500);
              item = resolveItem(featureLabels);
            }
          }
          if (item) break;
          // If still not found, click body to close any stuck menu and try again
          document.body.click();
          await sleep(300);
        }

        if (!item) {
          return [{
            Feature: featureLabels[0],
            Status: apiAvailable ? 'api_available_dom_unresolved' : 'missing',
            Detail: apiAvailable ? 'Feature exists in public config, but the menu item was not resolved in this browser session.' : 'Feature entry not found in current Qwen menu.',
            Placeholder: '',
            Modes: Array.isArray(cfg.features?.feature_feature?.[featureKey]) ? cfg.features.feature_feature[featureKey].join(', ') : '',
            Inputs: Array.isArray(cfg.features?.feature_file?.[featureKey]) ? cfg.features.feature_file[featureKey].join(', ') : '',
          }];
        }
        if (isDisabled(item)) {
          return [{
            Feature: featureLabels[0],
            Status: 'disabled',
            Detail: 'Feature is disabled in the current session.',
            Placeholder: '',
            Modes: Array.isArray(cfg.features?.feature_feature?.[featureKey]) ? cfg.features.feature_feature[featureKey].join(', ') : '',
            Inputs: Array.isArray(cfg.features?.feature_file?.[featureKey]) ? cfg.features.feature_file[featureKey].join(', ') : '',
          }];
        }

        item.click();
        await sleep(800);
        const box = document.querySelector('textarea.message-input-textarea, textarea');
        const placeholder = box?.getAttribute('placeholder') || '';
        if (!box) {
          return [{
            Feature: featureLabels[0],
            Status: 'input-missing',
            Detail: 'Feature was selected but no textarea was found.',
            Placeholder: placeholder,
            Modes: Array.isArray(cfg.features?.feature_feature?.[featureKey]) ? cfg.features.feature_feature[featureKey].join(', ') : '',
            Inputs: Array.isArray(cfg.features?.feature_file?.[featureKey]) ? cfg.features.feature_file[featureKey].join(', ') : '',
          }];
        }

        box.focus();
        box.value = prompt;
        box.dispatchEvent(new Event('input', { bubbles: true }));
        box.dispatchEvent(new Event('change', { bubbles: true }));
        await sleep(300);

        const sendBtn = document.querySelector('button.send-button, .message-input-right-button-send button, .message-input-right-button-send .omni-button-content-btn');
        if (sendBtn && !sendBtn.disabled) sendBtn.click();
        else box.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true }));

        const start = Date.now();
        while (Date.now() - start < timeout * 1000) {
          await sleep(1500);
          if (loginRequired()) {
            return [{
              Feature: featureLabels[0],
              Status: 'login_required',
              Detail: 'Prompt submission reached the login wall in the current session.',
              Placeholder: placeholder,
              Modes: Array.isArray(cfg.features?.feature_feature?.[featureKey]) ? cfg.features.feature_feature[featureKey].join(', ') : '',
              Inputs: Array.isArray(cfg.features?.feature_file?.[featureKey]) ? cfg.features.feature_file[featureKey].join(', ') : '',
            }];
          }
          const text = responseText();
          if (text) {
            return [{
              Feature: featureLabels[0],
              Status: 'completed',
              Detail: text.slice(0, 500),
              Placeholder: placeholder,
              Modes: Array.isArray(cfg.features?.feature_feature?.[featureKey]) ? cfg.features.feature_feature[featureKey].join(', ') : '',
              Inputs: Array.isArray(cfg.features?.feature_file?.[featureKey]) ? cfg.features.feature_file[featureKey].join(', ') : '',
            }];
          }
        }

        return [{
          Feature: featureLabels[0],
          Status: 'submitted',
          Detail: 'Prompt was submitted but no terminal state was observed within timeout.',
          Placeholder: placeholder,
          Modes: Array.isArray(cfg.features?.feature_feature?.[featureKey]) ? cfg.features.feature_feature[featureKey].join(', ') : '',
          Inputs: Array.isArray(cfg.features?.feature_file?.[featureKey]) ? cfg.features.feature_file[featureKey].join(', ') : '',
        }];
      })()
