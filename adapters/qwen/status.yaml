site: qwen
name: status
description: Check Qwen Studio public API and login state
domain: chat.qwen.ai
strategy: public
browser: true

columns: [Status, Login, Url, Title, Model, Features]

pipeline:
  - navigate: https://chat.qwen.ai/
  - wait: 2
  - evaluate: |
      (async () => {
        const safeJson = async (url, init) => {
          try {
            const res = await fetch(url, init);
            if (res.status === 401) return { unauthorized: true };
            const text = await res.text();
            try { return JSON.parse(text); } catch { return { raw: text, status: res.status }; }
          } catch (err) {
            return { error: String(err) };
          }
        };

        const config = await safeJson('/api/v2/configs/');
        const auths = await safeJson('/api/v1/auths/');
        const loginData = await safeJson('/api/v2/users/status', { method: 'POST' });
        const isLoggedIn = auths && !auths.unauthorized;
        const features = config?.data?.features || {};
        const modelName = Array.from(document.querySelectorAll('button, [role="button"], [aria-label]'))
          .map((el) => (el.getAttribute('aria-label') || el.textContent || '').trim())
          .find((text) => /^Qwen/i.test(text) || /Plus|Max|Coder/i.test(text)) || '';

        return [{
          Status: isLoggedIn ? 'Connected' : 'Login Required',
          Login: isLoggedIn ? 'Yes' : 'No',
          Url: location.href,
          Title: document.title || 'Qwen Studio',
          Model: modelName || 'Qwen3.6-Plus',
          Features: [
            features.enable_project ? 'project' : '',
            features.enable_anonymous ? 'anonymous' : '',
            features.enable_payment ? 'payment' : '',
            loginData?.data === true ? 'status-ok' : '',
          ].filter(Boolean).join(', '),
        }];
      })()
