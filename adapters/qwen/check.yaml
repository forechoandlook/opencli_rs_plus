site: qwen
name: check
description: Check Qwen Studio feature availability and current-session menu state
domain: chat.qwen.ai
strategy: public
browser: true
timeoutSeconds: 120

columns: [rank, Key, Label, Present, Disabled, Placeholder, Modes, Inputs]

pipeline:
  - navigate: https://chat.qwen.ai/
  - wait: 2
  - evaluate: |
      (async () => {
        const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        const featureSpecs = [
          { key: 'deep_research', labels: ['Deep Research', '深度研究', 'DeepResearch'] },
          { key: 'web_dev', labels: ['Web Dev', 'Web 开发', '网页开发'] },
          { key: 't2v', labels: ['Create Video', '生成视频', '创建视频'] },
          { key: 'slides', labels: ['Slides', '演示文稿', 'PPT'] },
          { key: 'search', labels: ['Web search', '联网搜索', '网页搜索'] },
          { key: 'artifacts', labels: ['Artifacts', '构件'] },
          { key: 'learn', labels: ['Learn', '学习'] },
          { key: 'travel', labels: ['Travel Planner', '旅行规划', '旅游规划'] },
        ];

        const cfgRes = await fetch('/api/v2/configs/');
        const cfgJson = await cfgRes.json();
        const cfg = cfgJson?.data || {};

        const candidates = () => Array.from(document.querySelectorAll('[role="menuitem"], button, [role="button"], div, span'));
        const findByText = (textList) =>
          candidates().find((node) => {
            const current = (node.textContent || '').replace(/\s+/g, ' ').trim();
            return textList.some(text => current === text || current.includes(text));
          });
        const resolveItem = (textList) => findByText(textList)?.closest?.('[role="menuitem"], button, [role="button"]') || findByText(textList) || null;
        
        const isDisabled = (node) => {
          if (!node) return false;
          const own = node.getAttribute?.('aria-disabled') === 'true' || node.getAttribute?.('disabled') != null;
          const cls = String(node.className || '');
          return own || /disabled/i.test(cls) || !!node.closest?.('[aria-disabled="true"], .ant-dropdown-menu-item-disabled, .ant-menu-item-disabled');
        };

        const rows = [];
        for (const spec of featureSpecs) {
          let item = null;
          for (let attempt = 0; attempt < 5; attempt++) {
            const trigger = document.querySelector('.mode-select .ant-dropdown-trigger') || document.querySelector('.mode-select');
            trigger?.click();
            await sleep(500);
            
            item = resolveItem(spec.labels);
            if (!item) {
              const moreBtn = resolveItem(['More', '更多']);
              if (moreBtn) {
                moreBtn.click();
                await sleep(500);
                item = resolveItem(spec.labels);
              }
            }
            if (item) break;
            // If still not found, click body to close any stuck menu and try again
            document.body.click();
            await sleep(300);
          }

          const apiAvailable =
            Object.prototype.hasOwnProperty.call(cfg.features?.feature_feature || {}, spec.key) ||
            Object.prototype.hasOwnProperty.call(cfg.features?.feature_file || {}, spec.key);
          const present = apiAvailable;
          const disabled = item ? isDisabled(item) : null;
          let placeholder = '';

          if (item && !disabled) {
            item.click();
            await sleep(600);
            placeholder = document.querySelector('textarea.message-input-textarea, textarea')?.getAttribute('placeholder') || '';
          }

          rows.push({
            Key: spec.key,
            Label: spec.labels[0],
            Present: present ? 'Yes' : 'No',
            Disabled: disabled == null ? 'Unknown' : (disabled ? 'Yes' : 'No'),
            Placeholder: placeholder,
            Modes: Array.isArray(cfg.features?.feature_feature?.[spec.key]) ? cfg.features.feature_feature[spec.key].join(', ') : '',
            Inputs: Array.isArray(cfg.features?.feature_file?.[spec.key]) ? cfg.features.feature_file[spec.key].join(', ') : '',
          });
        }

        return rows;
      })()

  - map:
      rank: ${{ index + 1 }}
      Key: ${{ item.Key }}
      Label: ${{ item.Label }}
      Present: ${{ item.Present }}
      Disabled: ${{ item.Disabled }}
      Placeholder: ${{ item.Placeholder }}
      Modes: ${{ item.Modes }}
      Inputs: ${{ item.Inputs }}
