site: qwen
name: resources
description: List downloadable Qwen Studio sample resources from public config
domain: chat.qwen.ai
strategy: public
browser: true

args:
  category:
    type: string
    default: all
    description: Resource category (all, image, video, webdev, artifacts)
  output:
    type: string
    default: ./downloads/qwen
    description: Output directory for downloaded media

columns: [Category, Title, Type, Url]

pipeline:
  - navigate: https://chat.qwen.ai/
  - wait: 2
  - evaluate: |
      (async () => {
        const category = String(${{ args.category | json }} || 'all').toLowerCase();
        const res = await fetch('/api/v2/configs/?code=query-suggestion');
        const json = await res.json();
        const root = json?.data || {};
        const localeData = root['en-US'] || root['zh-CN'] || Object.values(root).find(v => v && typeof v === 'object') || {};
        const items = [];
        const push = (cat, type, item) => {
          const url = item?.src || item?.image || item?.darkSrc || '';
          const title = item?.title || item?.description || '';
          if (!url || (!title && !item?.description)) return;
          items.push({ type, url });
        };

        const allow = (cat) => category === 'all' || category === cat;
        if (allow('image')) (localeData.image || []).forEach(item => push('image', 'image', item));
        if (allow('video')) (localeData.video || []).forEach(item => push('video', 'video', item));
        if (allow('webdev')) (localeData.webdev || []).forEach(item => push('webdev', 'image', item));
        if (allow('artifacts')) (localeData.artifacts || []).forEach(item => push('artifacts', 'image', item));

        return { media: items };
      })()

  - download:
      items: media
      type: media-batch
      output: "${{ args.output }}"
      username: qwen
