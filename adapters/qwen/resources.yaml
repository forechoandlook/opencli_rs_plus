site: qwen
name: resources
description: List downloadable Qwen resources and files
domain: chat.qwen.ai
strategy: public
browser: true

columns: [FileID, Name, Type, Size, Status]

pipeline:
  - navigate: https://chat.qwen.ai/
  - wait: 2
  - evaluate: |
      (async () => {
        try {
          const filesRes = await fetch('/api/v2/files/');
          const filesJson = await filesRes.json();
          const files = filesJson?.data?.list || [];
          
          if (files.length === 0) {
            return [{
              FileID: 'N/A',
              Name: 'No files found',
              Type: 'N/A',
              Size: '0',
              Status: 'empty'
            }];
          }
          
          return files.map(file => ({
            FileID: file.id,
            Name: file.name,
            Type: file.content_type || 'unknown',
            Size: String(file.size || '0'),
            Status: file.status || 'unknown'
          }));
        } catch (e) {
          return [{
            FileID: 'error',
            Name: 'API Error',
            Type: 'N/A',
            Size: '0',
            Status: e.message
          }];
        }
      })()
