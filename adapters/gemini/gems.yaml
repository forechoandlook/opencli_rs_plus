site: gemini
name: gems
description: List and manage Gemini Gems (custom AI agents)
domain: gemini.google.com
strategy: cookie
browser: true

args:
  limit:
    type: int
    default: 20
    description: Max number of Gems to list

columns: [name, description, link]

pipeline:
  - navigate: https://gemini.google.com/gems/view
  - wait:
      time: 4
  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }} || 20;
        const gems = [];
        const cards = document.querySelectorAll('a.template-gallery-card');
        for (const card of cards) {
          if (gems.length >= limit) break;
          const ariaLabel = card.getAttribute('aria-label') || '';
          const name = ariaLabel.replace('Start a new conversation with Gem: ', '').trim();
          const href = card.getAttribute('href') || '';
          const fullHref = 'https://gemini.google.com' + href;
          // Try to get description from parent or sibling
          const parent = card.closest('.premade-gems-card, [class*=gem-card]');
          let desc = '';
          if (parent) {
            const descEl = parent.querySelector('[class*=desc], p, [class*=description]');
            desc = descEl ? descEl.innerText.trim() : '';
          }
          if (!desc) desc = name; // fallback
          if (name) {
            gems.push({ name, description: desc.slice(0, 200), link: fullHref });
          }
        }
        return gems;
      })()
