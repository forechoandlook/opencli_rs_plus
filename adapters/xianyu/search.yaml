site: xianyu
name: search
description: 搜索闲鱼商品
domain: www.goofish.com
strategy: cookie
browser: true

args:
  query:
    type: str
    required: true
    positional: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of results to return

pipeline:
  - navigate: https://www.goofish.com/search?q=${{ args.query | urlencode }}

  - wait: 2

  - scroll:
      times: 2
      delay: 800

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit | json }};
        const wait = (ms) => new Promise(r => setTimeout(r, ms));
        const start = Date.now();
        while (Date.now() - start < 8000) {
          if (document.querySelector('a[href*="/item?id="]') || /请先登录|暂无相关宝贝/.test(document.body?.innerText || '')) break;
          await wait(150);
        }
        const clean = (v) => (v || '').replace(/\s+/g, ' ').trim();
        const items = Array.from(document.querySelectorAll('a[href*="/item?id="]')).slice(0, limit).map(card => {
          const href = card.href || card.getAttribute('href') || '';
          const title = clean(card.querySelector('[class*="row1-wrap-title"], [class*="main-title"]')?.textContent || '');
          const priceWrap = card.querySelector('[class*="price-wrap"]');
          const priceNum = clean(priceWrap?.querySelector('[class*="number"]')?.textContent || '');
          const priceDec = clean(priceWrap?.querySelector('[class*="decimal"]')?.textContent || '');
          const price = priceNum ? ('¥' + priceNum + priceDec) : '';
          const attrs = Array.from(card.querySelectorAll('[class*="row2-wrap-cpv"] span[class*="cpv--"]')).map(n => clean(n.textContent || '')).filter(Boolean);
          const location = clean(card.querySelector('[class*="row4-wrap-seller"] [class*="seller-text"]')?.textContent || '');
          const idMatch = href.match(/[?&]id=(\d+)/);
          return { item_id: idMatch ? idMatch[1] : '', title, price, condition: attrs[0] || '', brand: attrs[1] || '', location, url: href };
        }).filter(item => item.title);
        return items;
      })()

  - map:
      rank: ${{ index + 1 }}
      item_id: ${{ item.item_id }}
      title: ${{ item.title }}
      price: ${{ item.price }}
      condition: ${{ item.condition }}
      brand: ${{ item.brand }}
      location: ${{ item.location }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [rank, item_id, title, price, condition, location]
