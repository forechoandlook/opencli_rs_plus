site: zhihu
name: collection_items_api
description: 获取收藏夹内的所有条目 (API 版本，无需浏览器渲染)
domain: www.zhihu.com
browser: true
timeoutSeconds: 30

args:
  collection_id:
    positional: true
    type: str
    required: true
    description: "Collection ID"
  limit:
    type: int
    default: 20
    description: "Number of items to fetch per request"
  offset:
    type: int
    default: 0
    description: "Offset for pagination"

pipeline:
  - navigate:
      url: "https://www.zhihu.com"
      settleMs: 100

  - evaluate: |
      (async () => {
        const collectionId = '${{ args.collection_id }}';
        const apiUrl = `https://www.zhihu.com/api/v4/collections/${collectionId}/items?limit=${{ args.limit }}&offset=${{ args.offset }}`;

        const response = await fetch(apiUrl, { credentials: 'include' });
        if (!response.ok) {
          throw new Error(`API request failed: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        const items = data?.data || [];

        if (items.length === 0 && ${{ args.offset }} === 0) {
          throw new Error(`No items found in collection ${collectionId}`);
        }

        return items;
      })()

  - map:
      rank: ${{ index + 1 }}
      type: ${{ item.content.type }}
      title: ${{ item.content.title || item.content.name || item.content.question.title || item.content.content[0].title || '' }}
      author: ${{ item.content.author.name || '' }}
      url: ${{ item.content.url }}
      excerpt: ${{ item.content.excerpt || '' }}
      votes: ${{ item.content.voteup_count || 0 }}

columns: [rank, type, title, author, votes]
