site: zhihu
name: collection_items_api
description: 获取收藏夹内的所有条目 (API 版本，无需浏览器渲染)
domain: www.zhihu.com
browser: true
timeoutSeconds: 30

args:
  collection_id:
    positional: true
    type: str
    required: true
    description: "Collection ID"
  limit:
    type: int
    default: 20
    description: "Number of items to fetch per request"
  offset:
    type: int
    default: 0
    description: "Offset for pagination"

pipeline:
  - bg_fetch:
      url: "https://www.zhihu.com/api/v4/collections/${{ args.collection_id }}/items?limit=${{ args.limit }}&offset=${{ args.offset }}"
      cookie_url: "https://www.zhihu.com"

  - select: body.data

  - evaluate: |
      (() => {
        const items = Array.isArray(${{ data }}) ? ${{ data }} : [];
        if (items.length === 0 && ${{ args.offset }} === 0) {
          throw new Error(`No items found in collection ${{ args.collection_id }}`);
        }
        return items;
      })()

  - map:
      rank: ${{ index + 1 }}
      type: ${{ item.content.type }}
      title: ${{ item.content.title || item.content.name || item.content.question.title || item.content.content[0].title || '' }}
      author: ${{ item.content.author.name || '' }}
      url: ${{ item.content.url }}
      excerpt: ${{ item.content.excerpt || '' }}
      votes: ${{ item.content.voteup_count || 0 }}

columns: [rank, type, title, author, votes]
