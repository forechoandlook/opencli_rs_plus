site: tieba
name: search
description: Search posts across Tieba (贴吧搜索)
domain: tieba.baidu.com
strategy: cookie
browser: true

args:
  keyword:
    type: str
    required: true
    positional: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of items to return

pipeline:
  - navigate: https://tieba.baidu.com/f/search/res?qw=${{ args.keyword | urlencode }}&ie=utf-8&pn=1

  - wait: 3

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit | json }};
        const wait = (ms) => new Promise(r => setTimeout(r, ms));
        const start = Date.now();
        while (Date.now() - start < 5000) {
          if (document.querySelector('.threadcardclass.thread-new3.index-feed-cards') || document.querySelector('.search-no-result, .search-nodata')) break;
          await wait(100);
        }
        const items = document.querySelectorAll('.threadcardclass.thread-new3.index-feed-cards');
        return Array.from(items).slice(0, limit).map((item) => {
          const forum = item.querySelector('.forum-name-text, .forum-name')?.textContent?.trim() || '';
          const meta = item.querySelector('.user-forum-info')?.textContent?.replace(/\s+/g, ' ').trim() || '';
          const metaWithoutForum = forum && meta.startsWith(forum) ? meta.slice(forum.length).trim() : meta;
          const metaMatch = metaWithoutForum.match(/^(.*?)\s*发布于\s*(.+)$/);
          const href = item.querySelector('a[href*="/p/"]')?.href || '';
          const title = item.querySelector('.title-wrap')?.textContent?.trim() || '';
          return {
            title,
            forum,
            author: metaMatch ? metaMatch[1].trim() : metaWithoutForum,
            time: metaMatch ? metaMatch[2].trim() : '',
            url: href,
          };
        }).filter(item => item.title);
      })()

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      forum: ${{ item.forum }}
      author: ${{ item.author }}
      time: ${{ item.time }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [rank, title, forum, author, time]
