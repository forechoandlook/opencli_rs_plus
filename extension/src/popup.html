<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCLI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      width: 240px;
      padding: 14px 16px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .label {
      color: #6c7086;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="number"] {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 4px;
      color: #89b4fa;
      font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
      font-size: 14px;
      padding: 3px 8px;
      width: 90px;
      text-align: center;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #89b4fa;
    }
    #status {
      font-size: 11px;
      transition: color 0.3s;
    }
    button {
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid #313244;
      border-radius: 4px;
      background: #313244;
      color: #cdd6f4;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #45475a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    hr {
      border: none;
      border-top: 1px solid #313244;
      margin: 10px 0;
    }
    .hint {
      font-size: 10px;
      color: #6c7086;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="row">
    <span class="label">Daemon Port</span>
    <input type="number" id="port-input" value="19825" min="1" max="65535" />
  </div>
  <div class="row">
    <span id="status" style="color:#888">Checking…</span>
    <button id="save-btn">Save</button>
  </div>
  <hr>
  <p class="hint">Set port to match OPENCLI_DAEMON_PORT env.</p>
  <script type="module" src="dist/popup.js"></script>
</body>
</html>
